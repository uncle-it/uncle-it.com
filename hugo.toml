baseURL = 'https://example.org/'
locale = 'en-us'
title = 'Uncle IT'
theme = 'uncleIt'

disablePathToLower = false # 强制所有 URL 路径转为小写

defaultContentLanguage = "zh-cn" # 默认语言
[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    contentDir = "content/zh-cn" # 中文内容放在这里
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"    # 英文内容放在这里
    weight = 2
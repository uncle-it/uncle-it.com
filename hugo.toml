baseURL = 'https://example.org/'
locale = 'en-us'
title = 'My New Hugo Project'
theme = 'uncleIt'

defaultContentLanguage = "zh-cn" # 默认语言

[languages]
  [languages.zh-cn]
    languageName = "简体中文"
    contentDir = "content/zh-cn" # 中文内容放在这里
    weight = 1
  [languages.en]
    languageName = "English"
    contentDir = "content/en"    # 英文内容放在这里
    weight = 2